name: Scrape VRP Reports

on:
  schedule:
    - cron: '0 6 * * 0'   # 6 AM UTC every Sunday
  workflow_dispatch:        # allow manual trigger from Actions UI

permissions:
  contents: write           # needed to push the data branch

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout data branch into data/
        uses: actions/checkout@v4
        with:
          ref: data
          path: data
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -e .

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Discover current-year issues (re-runs to catch newly published)
        run: vrp discover --year $(date +%Y) --no-resume

      - name: Scrape issues (incremental — skips already-scraped)
        run: vrp scrape

      - name: Reprocess + generate markdown + rebuild index
        run: |
          vrp reprocess
          vrp markdown
          vrp index

      - name: Commit updated data to data branch
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update data $(date -u +%Y-%m-%d)"
          git push origin data

      - name: Build static dist/
        run: bash build.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=vrp-reports --commit-dirty=true
