name: Scrape VRP Reports

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC daily
  workflow_dispatch:        # allow manual trigger from Actions UI

permissions:
  contents: write           # needed to push the data branch
  pages: write              # needed to deploy to GitHub Pages
  id-token: write           # needed for OIDC token for Pages deployment

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code (master)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Checkout data branch into data/
        uses: actions/checkout@v4
        with:
          ref: data
          path: data
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -e .

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Discover current-year issues (re-runs to catch newly published)
        run: vrp discover --year $(date +%Y) --no-resume

      - name: Scrape issues (incremental — skips already-scraped)
        run: vrp scrape

      - name: Reprocess + generate markdown + rebuild index
        run: |
          vrp reprocess
          vrp markdown
          vrp index

      - name: Commit updated data to data branch
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update data $(date -u +%Y-%m-%d)"
          git push origin data

      - name: Build static dist/
        run: bash build.sh

      - name: Add .nojekyll (prevent Jekyll processing)
        run: touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
