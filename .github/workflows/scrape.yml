name: Scrape VRP Reports

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 03:17 UTC.
    - cron: '17 3 * * 1'

concurrency:
  group: scrape-vrp-reports
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      VRP_CONCURRENCY: "2"
      VRP_DELAY: "3"
      VRP_DOWNLOAD_ATTACHMENTS: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          playwright install --with-deps chromium

      - name: Scrape recent VRP reports
        run: |
          current_year="$(date -u +%Y)"
          previous_year="$((current_year - 1))"
          vrp update --year "${previous_year}" --year "${current_year}" --refresh-discovery

      - name: Commit data updates
        id: commit_data
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- index.json stats.json discovery_queue.json
          find . -maxdepth 1 -name 'discovery_*.json' -print0 | xargs -0 -r git add --
          find issues -type f \( -name report.json -o -name report.md \) -print0 | xargs -0 -r git add --

          if git diff --cached --quiet; then
            echo "No VRP data changes to commit."
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git commit -m "chore: update VRP reports $(date -u +%Y-%m-%d)"
          git push origin HEAD:data
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Build static dist/
        if: steps.commit_data.outputs.changed == 'true'
        run: bash build.sh

      - name: Deploy to Cloudflare Pages
        if: steps.commit_data.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=vrp-reports --commit-dirty=true
